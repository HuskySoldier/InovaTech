server:
  port: 8761 # El puerto estándar de Eureka

spring:
  application:
    name: discovery-server

eureka:
  instance:
    hostname: localhost
  client:
    # Como él es el servidor, le decimos que no se registre a sí mismo
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
