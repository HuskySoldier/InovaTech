version: '3.8'

services:
  # ==========================================
  # 1. INFRAESTRUCTURA BASE
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root # Cambia esto por la contraseña que uses en tus properties
      # No creamos una DB por defecto aquí porque Spring Boot creará las necesarias
    ports:
      - "3306:3306"
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s       # Revisa cada 10 segundos
      timeout: 5s         # Espera máximo 5 segundos por respuesta
      retries: 5          # Falla definitivamente si no responde después de 5 intentos
      start_period: 30s   # Le da 30 segundos de gracia la primera vez que arranca para crear las DBs

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    environment:
      # Inyectamos el hostname para que no use 'localhost' dentro de la red Docker
      - EUREKA_HOSTNAME=discovery-server
    ports:
      - "8761:8761"
    networks:
      - innovatech-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"   # Puerto de comunicación para microservicios
      - "15672:15672" # Interfaz gráfica de administración
    networks:
      - innovatech-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080" # Toda petición desde el frontend entrará por aquí
    environment:
      # Usamos la variable estándar de Spring Boot para Eureka
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
    networks:
      - innovatech-network

  # ==========================================
  # 2. MICROSERVICIOS CORE (AUTENTICACIÓN Y SEGURIDAD)
  # ==========================================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
    networks:
      - innovatech-network

  privilegios-service:
    build: ./privilegios-service
    container_name: privilegios-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_privilegios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy   # Espera a que MySQL esté 100% listo para recibir conexiones
      discovery-server:
        condition: service_started   # Arranca en cuanto el contenedor de Eureka encienda
    networks:
      - innovatech-network

  usuarios-service:
    build: ./usuarios
    container_name: usuarios-service
    environment:
      # Variables estandarizadas a las propiedades nativas de Spring
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_innovatech_users?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - innovatech-network

  # ==========================================
  # 3. MICROSERVICIOS DE NEGOCIO (PROYECTOS Y TAREAS)
  # ==========================================
  estado-service:
    build: ./estado-service
    container_name: estado-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_estados?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - innovatech-network

  proyectos-service:
    build: ./proyectos
    container_name: proyectos-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_proyectos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - innovatech-network

  equipos-service:
    build: ./equipos
    container_name: equipos-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_equipos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - innovatech-network

  tareas-service:
    build: ./ms-tareas
    container_name: tareas-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_tareas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      rabbitmq:                        
        condition: service_healthy
    networks:
      - innovatech-network

  asignaciones-service:
    build: ./asignaciones
    container_name: asignaciones-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_asignaciones?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      rabbitmq:                        
        condition: service_healthy
    networks:
      - innovatech-network

# ==========================================
# 4. RED INTERNA
# ==========================================
networks:
  innovatech-network:
    driver: bridge