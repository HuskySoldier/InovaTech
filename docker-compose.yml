version: '3.8'

services:
  # ==========================================
  # 1. INFRAESTRUCTURA BASE
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql # Agregamos persistencia para no perder tus datos
    networks:
      - innovatech-network

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - innovatech-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
    networks:
      - innovatech-network

  # ==========================================
  # 2. MICROSERVICIOS CORE (AUTENTICACIÓN Y SEGURIDAD)
  # ==========================================
  privilegios-service:
    build:
      context: .
      dockerfile: privilegios-service/Dockerfile
    container_name: privilegios-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_privilegios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
    networks:
      - innovatech-network

  estado-service:
    build:
      context: .
      dockerfile: estado-service/Dockerfile
    container_name: estado-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_estados?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
    networks:
      - innovatech-network

  usuarios-service:
    build:
      context: .
      dockerfile: usuarios/Dockerfile
    container_name: usuarios-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_usuarios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
      - privilegios-service
      - estado-service
    networks:
      - innovatech-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
      - usuarios-service
    networks:
      - innovatech-network

  # ==========================================
  # 3. MICROSERVICIOS DE NEGOCIO
  # ==========================================
  proyectos-service:
    build:
      context: .
      dockerfile: proyectos/Dockerfile
    container_name: proyectos-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_proyectos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
      - estado-service
    networks:
      - innovatech-network

  tareas-service:
    build:
      context: .
      dockerfile: ms-tareas/Dockerfile
    container_name: tareas-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_tareas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
      - estado-service
    networks:
      - innovatech-network

  equipos-service:
    build:
      context: .
      dockerfile: equipos/Dockerfile
    container_name: equipos-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_equipos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
      - usuarios-service
      - proyectos-service
    networks:
      - innovatech-network

  asignaciones-service:
    build:
      context: .
      dockerfile: asignaciones/Dockerfile
    container_name: asignaciones-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_asignaciones?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - mysql-db
      - discovery-server
      - tareas-service
      - equipos-service
    networks:
      - innovatech-network

# ==========================================
# 4. RED Y VOLÚMENES
# ==========================================
networks:
  innovatech-network:
    driver: bridge

volumes:
  mysql_data: # Persistencia para MySQL