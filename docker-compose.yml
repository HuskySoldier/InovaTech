version: '3.8'

services:
  # ==========================================
  # 1. INFRAESTRUCTURA BASE
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: discovery-server
    container_name: discovery-server
    environment:
      - EUREKA_HOSTNAME=discovery-server
    ports:
      - "8761:8761"
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - innovatech-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  # ==========================================
  # 2. MICROSERVICIOS CORE
  # ==========================================
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: auth-service
    container_name: auth-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  privilegios-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: privilegios-service
    container_name: privilegios-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_privilegios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  usuarios-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: usuarios
    container_name: usuarios-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_innovatech_users?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  # ==========================================
  # 3. MICROSERVICIOS DE NEGOCIO
  # ==========================================
  estado-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: estado-service
    container_name: estado-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_estados?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  proyectos-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: proyectos
    container_name: proyectos-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_proyectos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  equipos-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: equipos
    container_name: equipos-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_equipos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - innovatech-network

  tareas-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: ms-tareas
    container_name: tareas-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_tareas?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - innovatech-network

  asignaciones-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: asignaciones
    container_name: asignaciones-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/innovatech_asignaciones?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - innovatech-network

  frontend-app:
    build: ./innovasync-front
    container_name: frontend-app
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - innovatech-network

networks:
  innovatech-network:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local