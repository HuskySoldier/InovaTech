server:
  port: 8086

spring:
  application:
    name: proyectos
  threads:
    virtual:
      enabled: true # Habilitamos Virtual Threads de Java 21
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true # Habilitamos Resilience4j para Feign
  
  datasource:
    url: jdbc:mysql://localhost:3306/db_innovatech_proyectos?createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true # ¡ESTO ES VITAL EN DOCKER!

resilience4j:
  circuitbreaker:
    instances:
      estado-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true