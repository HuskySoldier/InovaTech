server:
  port: 8082  # Puerto del MS Auth (diferente al frontend que usa 4200)

spring:
  application:
    name: auth-service  # Nombre del microservicio

  datasource:
    url: jdbc:mysql://localhost:3306/innovasync_auth
    username: root       # Tu usuario de MySQL
    password: ""         # Tu contraseña de MySQL
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # Crea las tablas automáticamente
    show-sql: true        # Muestra las consultas SQL en consola

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  # Service Registry