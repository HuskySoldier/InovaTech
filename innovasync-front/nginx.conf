server  {
    listen 80;
    server_name localhost;

    # 1. Rutas del Frontend (Angular)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Redirección al Backend (Proxy Inverso)
    location /api/ {
        # 'ms-tareas' o 'api-gateway' es el nombre del contenedor o servicio en tu docker-compose
        proxy_pass http://api-gateway:8080; 
        
        # Cabeceras estándar para mantener la información de la petición original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}