<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>InnovaSync</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>
  window.onpageshow = function(event) {
    // Si esto imprime en consola, el script está vivo
    console.log("[BROWSER] Página restaurada (persisted:", event.persisted, ")");

    if (event.persisted) {
      var token = localStorage.getItem('token');
      // Verificamos si el token es nulo o vacío
      if (!token && window.location.pathname !== '/login') {
        console.warn("[BROWSER] No hay sesión, forzando redirección...");
        window.location.replace('/login');
      }
    }
  };
</script>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
