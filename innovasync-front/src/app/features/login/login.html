<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        
        <div class="card shadow-lg border-0 rounded-4 login-card">
          <div class="card-body p-5">

            <div class="text-center mb-4">
              <h1 class="fw-bold" style="color: #1A2B4C;"> InnovaSync</h1>
              <p class="text-muted">Gestión de proyectos y equipos</p>
            </div>

            <form (ngSubmit)="login()">

              <div class="mb-3">
                <label class="form-label fw-semibold" style="color: #1A2B4C;">
                  Correo electrónico
                </label>
                <input 
                  type="email"
                  class="form-control form-control-lg"
                  name="email" 
                  [(ngModel)]="email"
                  placeholder="example@innovasync.cl"
                  required
                />
              </div> <div class="mb-3">
                <label class="form-label fw-semibold" style="color: #1A2B4C;">
                  Contraseña
                </label>
                <input 
                  type="password"
                  class="form-control form-control-lg"
                  name="password"
                  [(ngModel)]="password"
                  placeholder="••••••••"
                  required
                />
              </div> <div class="alert alert-danger py-2" *ngIf="errorMsg">
                {{ errorMsg }}
              </div>

              <button 
                class="btn btn-lg w-100 mt-2 fw-bold text-white"
                style="background: #00A8E8;"
                type="submit" 
                [disabled]="cargando">
  
                <span *ngIf="cargando">
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  Cargando...
                </span>
                <span *ngIf="!cargando">Ingresar</span>
              </button>

            </form>
            </div>
        </div>

      </div>
    </div>
  </div>
</div>
