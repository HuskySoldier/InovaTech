<div class="d-flex" style="height: 100vh;">

  <!-- Main -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">
    <div class="d-flex justify-content-between align-items-center px-4 py-3 bg-white shadow-sm">
      <span class="fw-semibold text-muted">
        <i class="bi bi-gear me-2"></i>Configuración
      </span>
      <button class="btn btn-sm text-white fw-bold px-3" style="background: #00A8E8;" (click)="guardarCambios()">
        <i class="bi bi-floppy me-1"></i>Guardar Cambios
      </button>
    </div>

    <div class="p-4 overflow-auto" style="background: #F4F7F6;">
      <h2 class="fw-bold mb-4" style="color: #1A2B4C;">Configuración</h2>

      <div class="d-flex gap-4">
        <div class="card border-0 shadow-sm rounded-3 p-2 config-menu" style="width: 200px; height: fit-content;">
          <button class="btn text-start rounded-2 mb-1"
            [class.active-link]="pestanaActiva === 'perfil'"
            [class.text-white]="pestanaActiva === 'perfil'"
            (click)="cambiarPestana('perfil')">
            <i class="bi bi-person me-2"></i>Perfil
          </button>
          <button class="btn text-start rounded-2 mb-1"
            [class.active-link]="pestanaActiva === 'apariencia'"
            [class.text-white]="pestanaActiva === 'apariencia'"
            (click)="cambiarPestana('apariencia')">
            <i class="bi bi-palette me-2"></i>Apariencia
          </button>
          <button class="btn text-start rounded-2 mb-1"
            [class.active-link]="pestanaActiva === 'notificaciones'"
            [class.text-white]="pestanaActiva === 'notificaciones'"
            (click)="cambiarPestana('notificaciones')">
            <i class="bi bi-bell me-2"></i>Notificaciones
          </button>
          <button class="btn text-start rounded-2"
            *ngIf="rolUsuario === '1'"
            [class.active-link]="pestanaActiva === 'roles'"
            [class.text-white]="pestanaActiva === 'roles'"
            (click)="cambiarPestana('roles')">
            <i class="bi bi-shield-lock me-2"></i>Gestión de Roles
          </button>
        </div>

        <div class="card border-0 shadow-sm rounded-3 p-4 flex-grow-1 config-content">

          <!-- PERFIL -->
          <div *ngIf="pestanaActiva === 'perfil'">
            <h5 class="fw-bold mb-4" style="color: #1A2B4C;">
              <i class="bi bi-person-circle me-2"></i>Mi Perfil
            </h5>
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre completo</label>
              <input type="text" [(ngModel)]="nombre" class="form-control" (ngModelChange)="actualizarCorreo()"/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Correo electrónico</label>
              <input type="email" [(ngModel)]="email" class="form-control" disabled/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Cargo</label>
              <select [(ngModel)]="cargo" class="form-select" [disabled]="rolUsuario !=='1'">
                <option value="">-- Selecciona un cargo --</option>
                <option *ngFor="let c of cargos" [value]="c.nombreCargo">
                  {{ c.nombreCargo }}
                </option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Nueva contraseña</label>
              <input type="password"[(ngModel)]="nuevaContrasena" placeholder="••••••••" class="form-control"/>
            </div>
          </div>

          <!-- APARIENCIA -->
          <div *ngIf="pestanaActiva === 'apariencia'">
            <h5 class="fw-bold mb-4" style="color: #1A2B4C;">
              <i class="bi bi-palette me-2"></i>Apariencia
            </h5>
            <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
              <span><i class="bi bi-moon me-2"></i>Tema oscuro</span>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox"
                      [(ngModel)]="temaOscuro"
                      (change)="cambiarTema()"/>
              </div>
            </div>
          </div>

          <!-- NOTIFICACIONES -->
          <div *ngIf="pestanaActiva === 'notificaciones'">
            <h5 class="fw-bold mb-4" style="color: #1A2B4C;">
              <i class="bi bi-bell me-2"></i>Notificaciones
            </h5>
            <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
              <span><i class="bi bi-envelope me-2"></i>Notificaciones por email</span>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" [(ngModel)]="notifEmail"/>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
              <span><i class="bi bi-bell me-2"></i>Notificaciones del sistema</span>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" [(ngModel)]="notifSistema"/>
              </div>
            </div>
          </div>

          <!-- GESTIÓN DE ROLES -->
          <div *ngIf="pestanaActiva === 'roles' && rolUsuario === '1'">
            <h5 class="fw-bold mb-4" style="color: #1A2B4C;">
              <i class="bi bi-shield-lock me-2"></i>Gestión de Roles
            </h5>

            <div *ngIf="cargandoRoles" class="text-center py-4">
              <div class="spinner-border" style="color: #00A8E8;"></div>
              <p class="mt-2 text-muted">Cargando usuarios...</p>
            </div>

            <div class="table-responsive" *ngIf="!cargandoRoles">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Usuario</th>
                    <th>Rol Actual</th>
                    <th>Cambiar Rol</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let u of usuarios">
                    <td><i class="bi bi-person me-2"></i>{{ u.nombreCompleto }}</td>
                    <td>
                      <span class="badge rounded-pill px-3"
                        [style.background]="getColorRol(u.idRol)"
                        style="color: white;">
                        {{ getNombreRol(u.idRol) }}
                      </span>
                    </td>
                    <td>
                      <span *ngIf="u.idRol === 1" class="text-muted" style="font-size: 13px;">
                        No modificable
                      </span>
                      <select *ngIf="u.idRol !== 1" class="form-select form-select-sm" style="width: 150px;"
                        [(ngModel)]="u.idRol"
                        (change)="cambiarRolUsuario(u)">
                        <option *ngFor="let r of roles" [ngValue]="r.idRol">{{ r.nombre }}</option>
                      </select>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
