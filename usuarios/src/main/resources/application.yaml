server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: usuarios
  threads:
    virtual:
      enabled: true # Habilitamos Virtual Threads de Java 21
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
      circuitbreaker:
        enabled: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/db_innovatech_users?createDatabaseIfNotExist=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin123
    # Asegura que el productor sepa si el mensaje llegó al Exchange o a la Cola
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true # Falla si el mensaje no puede enrutarse a ninguna cola
    # Configuración de resiliencia para el consumidor
    listener:
      simple:
        acknowledge-mode: auto # El framework confirma el mensaje automáticamente si no hay excepciones
        prefetch: 1 # Procesa 1 mensaje a la vez por consumidor (balanceo de carga justo)
        retry:
          enabled: true # Habilita reintentos si el consumidor lanza una excepción
          initial-interval: 2000ms # Espera 2 segundos antes del primer reintento
          max-interval: 10000ms # Espera máxima de 10 segundos
          multiplier: 2.0 # Incremento exponencial (2s, 4s, 8s...)
          max-retries: 3 # Se rinde después de 3 intentos fallidos

  jpa:
    hibernate:
      # Recomendable parametrizar para usar 'validate' o 'none' en entornos productivos
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[format_sql]": true

resilience4j:
  circuitbreaker:
    instances:
      estado-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      privilegios-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true # ¡ESTO ES VITAL EN DOCKER!
    #ip-address: 127.0.0.1