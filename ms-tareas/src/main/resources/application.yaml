server:
  port: 8083

spring:
  application:
    name: ms-tareas
  security:
    user:
      name: admin
      password: 1234

  datasource:
    url: jdbc:mysql://localhost:3306/innovasync_tareas?createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    openfeign:
      client:
         config:
           default:
             connect-timeout: 5000
             read-timeout: 5000
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    #ip-address: 127.0.0.1

resilience4j:
  circuitbreaker:
    instances:
      estado-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true

