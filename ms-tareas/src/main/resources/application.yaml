server:
  port: 8083

spring:
  application:
    name: ms-tareas
  security:
    user:
      name: admin
      password: 1234

  datasource:
    url: jdbc:mysql://localhost:3306/innovasync_tareas
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    #ip-address: 127.0.0.1
