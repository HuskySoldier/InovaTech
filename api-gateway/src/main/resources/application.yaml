server:
  port: 8080

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  
  cloud:
    gateway:
      # --- CAMBIO IMPORTANTE: Agregamos 'mvc' ---
      mvc:
        routes:
          - id: usuarios-route
            uri: lb://usuarios
            predicates:
              - Path=/api/usuarios/**
            filters:
              - StripPrefix=1 # Quita '/api' antes de enviar la petición

          - id: privilegios-route
            uri: lb://privilegios-service
            predicates:
              # Usamos una lista para múltiples paths
              - Path=/api/roles/**, /api/privilegios/**
            filters:
              - StripPrefix=1

          - id: auth-route
            uri: lb://auth-service
            predicates:
              - Path=/api/auth/**
            filters:
              - StripPrefix=1

          - id: proyectos-route
            uri: lb://proyectos
            predicates:
              - Path=/api/proyectos/**
            filters:
              - StripPrefix=1

          - id: estado-route
            uri: lb://estado-service
            predicates:
              - Path=/api/estados/**, /api/tipos/**
            filters:
              - StripPrefix=1

          - id: tareas-route
            uri: lb://ms-tareas
            predicates:
              - Path=/api/tareas/**, /api/prioridades/**, /api/historial-tareas/**
            filters:
              - StripPrefix=1


management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true