server:
  port: 8080

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: usuarios-route
          uri: lb://usuarios # Asegúrate de que su spring.application.name sea 'usuarios'
          predicates:
            - Path=/api/usuarios/**
            
        - id: proyectos-route
          uri: lb://proyectos
          predicates:
            - Path=/api/proyectos/**
            
        - id: equipos-route
          uri: lb://equipos
          predicates:
            - Path=/api/equipos/**
            
        - id: privilegios-route
          uri: lb://privilegios-service
          predicates:
            - Path=/api/roles/**, /api/privilegios/**
            
        - id: auth-route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
            
        - id: asignaciones-route
          uri: lb://asignaciones
          predicates:
            - Path=/api/asignaciones/**

        - id: estado-route
          uri: lb://estado-service
          predicates:
            - Path=/api/estados/**, /api/tipos/**

        - id: tareas-route
          uri: lb://ms-tareas
          predicates:
            - Path=/api/tareas/**, /api/prioridades/**, /api/historial-tareas/**

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true