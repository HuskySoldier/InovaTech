server:
  port: 8080

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  
  cloud:
    gateway:
      # --- INICIO CONFIGURACIÓN CORS CENTRALIZADA ---
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # --- FIN CONFIGURACIÓN CORS ---

      server:
        webmvc:
          discovery:
            locator:
              enabled: false
          routes:
            - id: auth-route
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: auth-service
                    fallbackUri: forward:/fallback/auth
 
            - id: usuarios-route
              uri: lb://usuarios
              predicates:
                - Path=/api/usuarios/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: usuarios
                    fallbackUri: forward:/fallback/usuarios
 
            - id: privilegios-route
              uri: lb://privilegios-service
              predicates:
                - Path=/api/roles/**, /api/privilegios/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: privilegios-service
                    fallbackUri: forward:/fallback/privilegios
 
            - id: estado-route
              uri: lb://estado-service
              predicates:
                - Path=/api/estados/**, /api/tipos/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: estado-service
                    fallbackUri: forward:/fallback/estado
 
            - id: proyectos-route
              uri: lb://proyectos
              predicates:
                - Path=/api/proyectos/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: proyectos
                    fallbackUri: forward:/fallback/proyectos
 
            - id: equipos-route
              uri: lb://equipos
              predicates:
                - Path=/api/equipos/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: equipos
                    fallbackUri: forward:/fallback/equipos
 
            - id: tareas-route
              uri: lb://ms-tareas
              predicates:
                - Path=/api/tareas/**, /api/prioridades/**, /api/historial-tareas/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: ms-tareas
                    fallbackUri: forward:/fallback/tareas
 
            - id: asignaciones-route
              uri: lb://asignaciones
              predicates:
                - Path=/api/asignaciones/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: asignaciones
                    fallbackUri: forward:/fallback/asignaciones

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      usuarios:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      privilegios-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      estado-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      proyectos:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      equipos:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      ms-tareas:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      asignaciones:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true