server:
  port: 8080

# 1. Mover springdoc a nivel raíz
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth-service
      - name: Usuarios
        url: /v3/api-docs/usuarios
      - name: Privilegios
        url: /v3/api-docs/privilegios-service
      - name: Estado
        url: /v3/api-docs/estado-service
      - name: Proyectos
        url: /v3/api-docs/proyectos
      - name: Equipos
        url: /v3/api-docs/equipos
      - name: Tareas
        url: /v3/api-docs/ms-tareas
      - name: Asignaciones
        url: /v3/api-docs/asignaciones

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      server:
        webmvc:
          discovery:
            locator:
              enabled: false
          routes:
            # --- RUTAS PARA AGREGAR SWAGGER (PROXY) ---
            - id: auth-docs
              uri: lb://auth-service
              predicates:
                - Path=/v3/api-docs/auth-service
              filters:
                - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

            - id: usuarios-docs
              uri: lb://usuarios
              predicates:
                - Path=/v3/api-docs/usuarios
              filters:
                - RewritePath=/v3/api-docs/usuarios, /v3/api-docs

            - id: privilegios-docs
              uri: lb://privilegios-service
              predicates:
                - Path=/v3/api-docs/privilegios-service
              filters:
                - RewritePath=/v3/api-docs/privilegios-service, /v3/api-docs

            - id: estado-docs
              uri: lb://estado-service
              predicates:
                - Path=/v3/api-docs/estado-service
              filters:
                - RewritePath=/v3/api-docs/estado-service, /v3/api-docs

            - id: proyectos-docs
              uri: lb://proyectos
              predicates:
                - Path=/v3/api-docs/proyectos
              filters:
                - RewritePath=/v3/api-docs/proyectos, /v3/api-docs

            - id: equipos-docs
              uri: lb://equipos
              predicates:
                - Path=/v3/api-docs/equipos
              filters:
                - RewritePath=/v3/api-docs/equipos, /v3/api-docs

            - id: tareas-docs
              uri: lb://ms-tareas
              predicates:
                - Path=/v3/api-docs/ms-tareas
              filters:
                - RewritePath=/v3/api-docs/ms-tareas, /v3/api-docs

            - id: asignaciones-docs
              uri: lb://asignaciones
              predicates:
                - Path=/v3/api-docs/asignaciones
              filters:
                - RewritePath=/v3/api-docs/asignaciones, /v3/api-docs

            # --- RUTAS DE NEGOCIO ---
            - id: auth-route
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: auth-service
                    fallbackUri: forward:/fallback/auth

            - id: usuarios-route
              uri: lb://usuarios
              predicates:
                - Path=/api/usuarios/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: usuarios
                    fallbackUri: forward:/fallback/usuarios

            - id: privilegios-route
              uri: lb://privilegios-service
              predicates:
                - Path=/api/roles/**, /api/privilegios/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: privilegios-service
                    fallbackUri: forward:/fallback/privilegios

            - id: estado-route
              uri: lb://estado-service
              predicates:
                - Path=/api/estados/**, /api/tipos/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: estado-service
                    fallbackUri: forward:/fallback/estado

            - id: proyectos-route
              uri: lb://proyectos
              predicates:
                - Path=/api/proyectos/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: proyectos
                    fallbackUri: forward:/fallback/proyectos

            - id: equipos-route
              uri: lb://equipos
              predicates:
                - Path=/api/equipos/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: equipos
                    fallbackUri: forward:/fallback/equipos

            - id: tareas-route
              uri: lb://ms-tareas
              predicates:
                - Path=/api/tareas/**, /api/prioridades/**, /api/historial-tareas/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: ms-tareas
                    fallbackUri: forward:/fallback/tareas

            - id: asignaciones-route
              uri: lb://asignaciones
              predicates:
                - Path=/api/asignaciones/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: asignaciones
                    fallbackUri: forward:/fallback/asignaciones

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      # ... (mantiene el resto de tu config de resilience4j igual)
      auth-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      usuarios:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
