server:
  port: 8085

spring:
  application:
    name: asignaciones
  threads:
    virtual:
      enabled: true
  
  datasource:
    url: jdbc:mysql://localhost:3306/db_innovatech_asignaciones?createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1